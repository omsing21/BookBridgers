<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookBridgers — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{font-family:'Helvetica Neue',Arial,sans-serif;color:#2b3b4a;background:#f7f9fb;margin:0;line-height:1.5;}
.page-wrap{max-width:1200px;margin:0 auto;}
.topbar{background:#fff;border-bottom:1px solid rgba(43,59,74,0.03);}
.brand{font-weight:700;color:#7fb1ff;display:flex;align-items:center;gap:.6rem;}
.brand .logo{width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,#cfe9ff,#a7f0d0);display:inline-flex;align-items:center;justify-content:center;}
nav a{color:#2b3b4a;text-decoration:none;margin-right:16px;}
nav a:hover{color:#7fb1ff;}
form{background:#fff;padding:30px;border-radius:12px;box-shadow:0 8px 20px rgba(18,34,56,0.05);}
.btn-primary{background:#85a9ff;color:white;border:none;padding:10px 20px;text-decoration:none;}
</style>
</head>
<body>
<header class="topbar py-3">
  <div class="page-wrap d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
      <div class="brand"><span class="logo">📚</span><span>BookBridgers</span></div>
      <nav>
        <a href="index.html">Home</a>
        <a href="community.html">Community</a>
        <a href="student.html">Student</a>
        <a href="library.html">Library</a>
        <a href="donor.html">Donor</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </div>
</header>

<main class="page-wrap my-5">
  <h2>Login</h2>
  <p style="color:#6b7785;">Sign in to access your dashboard.</p>
  <div class="row justify-content-center mt-4">
    <div class="col-6">
      <form>
        <div class="mb-3">
          <label>Email</label>
          <input type="email" class="form-control" placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label>Password</label>
          <input type="password" class="form-control">
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <button class="btn btn-primary">Login</button>
          <a href="signup.html" style="color:#6b7785;">Create an account</a>
        </div>
      </form>
    </div>
  </div>
</main>

<footer class="py-4 text-center" style="color:#6b7785;border-top:1px solid rgba(43,59,74,0.03);margin-top:40px;">
  <div class="page-wrap">©BookBridgers. Connecting students with knowledge.</div>
</footer>
</body>
</html>
